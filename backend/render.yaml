services:
  - type: web
    name: shared-expenses-backend
    env: node
    region: ohio
    plan: free
    buildCommand: yarn && yarn build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shared_expenses_db
          property: connectionString
      - key: JWT_SECRET
        sync: false
